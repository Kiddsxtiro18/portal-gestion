<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acceso Tenno - Bypass v2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .matriz-contenedor {
            background: #161b22;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #f06d06; margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #010409;
            color: #58a6ff;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            background: #f06d06;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #ff8c00;
            box-shadow: 0 0 15px rgba(240, 109, 6, 0.4);
        }
        button:disabled { background: #444; cursor: not-allowed; }
        #estado {
            font-size: 0.9em;
            margin-top: 20px;
            color: #8b949e;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="matriz-contenedor">
    <h2>Verificación de Operador</h2>
    <input type="text" id="nombre" placeholder="Alias de Operador" autocomplete="off">
    <textarea id="mensaje" placeholder="Mensaje para el Vacío" rows="3"></textarea>
    <button id="enviar">Iniciar Sincronización</button>
    <p id="estado">Canal de comunicación listo.</p>
</div>

<script>
    document.getElementById('enviar').addEventListener('click', async () => {
        const estado = document.getElementById('estado');
        const btn = document.getElementById('enviar');
        const n = document.getElementById('nombre').value;
        const m = document.getElementById('mensaje').value;

        if (!n || !m) {
            estado.innerText = "Error: Faltan datos en la matriz.";
            estado.style.color = "#f85149";
            return;
        }

        estado.innerText = "Transmitiendo a través del túnel de Vercel...";
        estado.style.color = "#8b949e";
        btn.disabled = true;

        try {
            // Ya no contactamos a Supabase directamente.
            // Enviamos la petición a nuestra propia ruta interna /api/insert.
            const response = await fetch('/api/insert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: n, mensaje: m })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Fallo en el servidor.");
            }

            const resultado = await response.json();

            if (resultado.success) {
                estado.innerText = "¡Sincronización Exitosa! Datos grabados vía Túnel.";
                estado.style.color = "#3fb950";
                document.getElementById('nombre').value = "";
                document.getElementById('mensaje').value = "";
            }
        } catch (err) {
            estado.innerText = "Fallo en el túnel: " + err.message;
            estado.style.color = "#f85149";
            console.error("Error de enlace:", err);
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
